name: smisdroid
description: Real-Time Financial Fraud Detection - Edge AI

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  telephony: ^0.2.0
  tflite_flutter: ^0.10.4
  tflite_text_classification: ^0.0.3
  http: ^1.2.0
  url_launcher: ^6.2.5
  sqflite: ^2.3.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.0
  flutter_local_notifications: ^17.0.0
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  intl: ^0.19.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/fraud_model.tflite
    - assets/data/keywords.json
    - assets/data/tld_list.json
